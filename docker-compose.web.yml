# NIS marketing site — production deploy.
# Runs on Hostinger VPS alongside n8n. Joins the existing n8n_default
# network so Traefik (which lives in /docker/n8n) can discover and route to it.
#
# Deploy:
#   docker compose -f docker-compose.web.yml up -d --build
#
# Update after git pull:
#   docker compose -f docker-compose.web.yml up -d --build

services:
  nis-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: https://thenispace.com
        NEXT_PUBLIC_PLOS_URL: https://app.thenispace.com
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: nis-web:latest
    container_name: nis-web
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=https://thenispace.com
      - NEXT_PUBLIC_PLOS_URL=https://app.thenispace.com
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_PRODUCTS_BUCKET=products
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-NIS <notifications@thenispace.com>}
      # Where buyer replies land (Resend replyTo). thenispace.com has no MX
      # record, so a reply to RESEND_FROM_EMAIL bounces — without this, the
      # emails stop promising "just reply". Point it at a real inbox.
      - SUPPORT_EMAIL=${SUPPORT_EMAIL:-}
      # Admin dashboard Basic Auth — leave unset to keep /admin disabled (404).
      - ADMIN_USER=${ADMIN_USER:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.nis-web.rule=Host(`thenispace.com`) || Host(`www.thenispace.com`)
      - traefik.http.routers.nis-web.tls=true
      - traefik.http.routers.nis-web.entrypoints=web,websecure
      - traefik.http.routers.nis-web.tls.certresolver=mytlschallenge
      - traefik.http.services.nis-web.loadbalancer.server.port=3000

networks:
  n8n_default:
    external: true
