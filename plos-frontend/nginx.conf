server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed Vite assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA: anything that isn't a real file falls back to index.html so client
  # routing handles it.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
